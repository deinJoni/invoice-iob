name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; a new push cancels the previous run (but never main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # build-test: the fast, Java-free feedback loop. Runs on a Node matrix so we prove BOTH the
  # dev/CI runtime (Node 24, where `node --test` strips TS types natively) AND the shipped bundle's
  # floor (Node 20 — the esbuild target and the .mcpb's declared minimum). format:check, typecheck
  # and the unit tests are dev-node checks (Node ≥22 runs the native-TS tests); build + the coverage
  # drift guard + pack + smoke run on EVERY node so a regression on the floor is caught on push.
  # ─────────────────────────────────────────────────────────────────────────────
  build-test:
    name: build · test · pack · smoke (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22', '24']
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pins pnpm from packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Dev-node checks (Node ≥22): formatting, types, unit tests. `node --test` runs the TypeScript
      # tests via native type-stripping (Node ≥22.18), so it cannot run on the Node-20 floor job.
      - name: Format check
        if: matrix.node-version != '20'
        run: pnpm run format:check

      - name: Typecheck
        if: matrix.node-version != '20'
        run: pnpm run typecheck

      - name: Unit tests (incl. report-parser gate tests)
        if: matrix.node-version != '20'
        run: pnpm test

      # Runs on every node — proves the SHIPPED artifact builds, packs and runs on the floor too.
      - name: Build bundle
        run: pnpm run build

      - name: Coverage drift guard (every format maps to a CI gate)
        run: pnpm run check:coverage

      - name: Pack .mcpb
        run: pnpm run pack:mcpb

      - name: Smoke test (real MCP stdio handshake — the gate for the visual PDF path)
        run: pnpm run smoke

      - name: Upload .mcpb artifact
        if: matrix.node-version == '24'
        uses: actions/upload-artifact@v4
        with:
          name: invoice-iob-mcpb
          path: dist/invoice-iob.mcpb
          if-no-files-found: error
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # kosit: P0 EXIT GATE. XRechnung (UBL & CII), for EVERY example, validated by the KoSIT validator.
  # We parse the VARL report, never the exit code (KoSIT exits 0 even for a REJECT — see
  # scripts/kosit-check.mjs). gen-fixtures only emits this gate's fixtures (FIXTURE_GATES=kosit).
  # ─────────────────────────────────────────────────────────────────────────────
  kosit:
    name: KoSIT XRechnung validation (P0 gate)
    runs-on: ubuntu-latest
    needs: build-test
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # lets fetch-kosit.sh resolve asset URLs via the API
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - run: pnpm install --frozen-lockfile
      - name: Build bundle
        run: pnpm run build
      - name: Generate XRechnung fixtures
        run: FIXTURE_GATES=kosit pnpm run fixtures
      - name: Fetch KoSIT validator + XRechnung config (pinned)
        run: bash scripts/ci/fetch-kosit.sh >> "$GITHUB_ENV"
      - name: KoSIT validate (parse VARL report, not exit code)
        run: node scripts/kosit-check.mjs

  # ─────────────────────────────────────────────────────────────────────────────
  # en16931: generic EN 16931 EXIT GATE for the pan-EU `ubl` / `cii` formats — validated against the
  # official CEN EN 16931 Schematron (ConnectingEurope/eInvoicing-EN16931) via Saxon-HE, parsing the
  # SVRL report's fatal failed-asserts (scripts/en16931-check.mjs). A different, independent
  # validator from KoSIT, so the two XML families are checked by two implementations of the rules.
  # ─────────────────────────────────────────────────────────────────────────────
  en16931:
    name: EN 16931 Schematron validation (UBL/CII)
    runs-on: ubuntu-latest
    needs: build-test
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - run: pnpm install --frozen-lockfile
      - name: Build bundle
        run: pnpm run build
      - name: Generate generic EN 16931 fixtures
        run: FIXTURE_GATES=en16931 pnpm run fixtures
      - name: Fetch CEN EN 16931 Schematron + Saxon-HE (pinned)
        run: bash scripts/ci/fetch-en16931.sh >> "$GITHUB_ENV"
      - name: EN 16931 validate (Saxon → parse SVRL, not exit code)
        run: node scripts/en16931-check.mjs

  # ─────────────────────────────────────────────────────────────────────────────
  # pdfa-hybrid: P2 EXIT GATE. The ZUGFeRD/Factur-X hybrid for EVERY profile (EN16931/BASIC/EXTENDED/
  # XRECHNUNG) × every example, validated by Mustangproject `--action validate` (embeds veraPDF for
  # PDF/A-3b + checks the Factur-X container + embedded XML EN 16931). Then, for the XRECHNUNG
  # profile, we extract the embedded factur-x.xml and run it through KoSIT — proving the embedded
  # document is itself a valid XRechnung, not just that the container validates.
  # ─────────────────────────────────────────────────────────────────────────────
  pdfa-hybrid:
    name: ZUGFeRD/Factur-X + PDF/A-3 validation (P2 gate, all profiles)
    runs-on: ubuntu-latest
    needs: build-test
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with: { node-version: '24', cache: pnpm }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21' }
      - run: pnpm install --frozen-lockfile
      - name: Build bundle
        run: pnpm run build
      - name: Generate hybrid fixtures (all profiles × all examples)
        run: FIXTURE_GATES=mustang pnpm run fixtures
      - name: Fetch Mustangproject CLI (pinned)
        run: bash scripts/ci/fetch-mustang.sh >> "$GITHUB_ENV"
      - name: Validate hybrids (Mustang --action validate → embedded veraPDF + Factur-X)
        run: node scripts/mustang-check.mjs
      # Cross-check: the XRECHNUNG-profile hybrid's embedded CII must itself pass KoSIT.
      - name: Fetch KoSIT validator + XRechnung config (pinned)
        run: bash scripts/ci/fetch-kosit.sh >> "$GITHUB_ENV"
      - name: Extract embedded factur-x.xml (Mustang --action extract)
        run: node scripts/extract-embedded.mjs
      - name: KoSIT validate the extracted embedded XRechnung CII
        run: FIXTURES_DIR=dist/embedded node scripts/kosit-check.mjs
