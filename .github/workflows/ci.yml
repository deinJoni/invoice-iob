name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; a new push cancels the previous run (but never main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # build-test: install → typecheck → test → build → pack → smoke. Produces the .mcpb.
  # ─────────────────────────────────────────────────────────────────────────────
  build-test:
    name: build · typecheck · test · pack · smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pins pnpm from packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build bundle
        run: pnpm run build

      - name: Pack .mcpb
        run: pnpm run pack:mcpb

      - name: Smoke test (real MCP stdio handshake)
        run: pnpm run smoke

      - name: Upload .mcpb artifact
        uses: actions/upload-artifact@v4
        with:
          name: invoice-iob-mcpb
          path: dist/invoice-iob.mcpb
          if-no-files-found: error
          retention-days: 14

  # ─────────────────────────────────────────────────────────────────────────────
  # kosit: P0 EXIT GATE. Generates XML fixtures, then validates them with the KoSIT
  # validator (Java) — parsing the VARL report, never the exit code (see kosit-check.mjs).
  # We rebuild here (rather than reuse the build-test artifact) to keep the job self-contained.
  # ─────────────────────────────────────────────────────────────────────────────
  kosit:
    name: KoSIT XRechnung validation (P0 gate)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build bundle
        run: pnpm run build

      - name: Generate XML fixtures
        run: node scripts/gen-fixtures.mjs

      # Resolve the asset download URLs via the GitHub Releases API rather than hardcoding paths
      # that rot on the next release. We pin the *tags* (validator v1.6.2; config v2026-01-31)
      # and let the API hand us the current browser_download_url for each asset.
      #
      # Documented fallback URLs (used if the API is unreachable; keep in sync with docs/STACK.md):
      #   jar:    https://github.com/itplr-kosit/validator/releases/download/v1.6.2/validator-1.6.2-standalone.jar
      #   config: https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/v2026-01-31/xrechnung-3.0.2-validator-configuration-2026-01-31.zip
      - name: Download KoSIT validator 1.6.2 + validator-configuration-xrechnung (2026-01-31)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATOR_TAG: v1.6.2
          CONFIG_TAG: v2026-01-31
        run: |
          set -euo pipefail
          mkdir -p .validators
          api() { gh api "$1" --jq "$2"; }

          # KoSIT validator: pick the *-standalone.jar asset of the pinned tag.
          JAR_URL="$(api \
            "repos/itplr-kosit/validator/releases/tags/${VALIDATOR_TAG}" \
            '.assets[] | select(.name | test("standalone.*\\.jar$")) | .browser_download_url' \
            | head -n1)"
          JAR_URL="${JAR_URL:-https://github.com/itplr-kosit/validator/releases/download/v1.6.2/validator-1.6.2-standalone.jar}"
          echo "validator jar: $JAR_URL"
          curl -fsSL "$JAR_URL" -o .validators/validator-standalone.jar

          # validator-configuration-xrechnung: the only .zip asset of the pinned tag.
          CFG_URL="$(api \
            "repos/itplr-kosit/validator-configuration-xrechnung/releases/tags/${CONFIG_TAG}" \
            '.assets[] | select(.name | test("\\.zip$")) | .browser_download_url' \
            | head -n1)"
          CFG_URL="${CFG_URL:-https://github.com/itplr-kosit/validator-configuration-xrechnung/releases/download/v2026-01-31/xrechnung-3.0.2-validator-configuration-2026-01-31.zip}"
          echo "config zip: $CFG_URL"
          curl -fsSL "$CFG_URL" -o .validators/config.zip
          unzip -q .validators/config.zip -d .validators/config

          # scenarios.xml sits at the root of the extracted configuration.
          SCENARIOS="$(find .validators/config -maxdepth 2 -name scenarios.xml | head -n1)"
          test -n "$SCENARIOS" || { echo "scenarios.xml not found in configuration zip"; exit 1; }
          echo "KOSIT_JAR=$PWD/.validators/validator-standalone.jar" >> "$GITHUB_ENV"
          echo "KOSIT_SCENARIOS=$PWD/$SCENARIOS" >> "$GITHUB_ENV"

      - name: KoSIT validate (parse VARL report, not exit code)
        env:
          FIXTURES_DIR: dist/fixtures
        run: node scripts/kosit-check.mjs

  # ─────────────────────────────────────────────────────────────────────────────
  # pdfa-hybrid: P2 EXIT GATE. Generates the ZUGFeRD/Factur-X hybrid, then validates it with the
  # Mustangproject CLI, whose `--action validate` runs an embedded veraPDF (PDF/A-3b conformance)
  # AND checks the Factur-X container + the embedded factur-x.xml against EN 16931. We parse the
  # report's summary status (Mustang's exit code is unreliable across versions; see mustang-check.mjs).
  # ─────────────────────────────────────────────────────────────────────────────
  pdfa-hybrid:
    name: ZUGFeRD/Factur-X + PDF/A-3 validation (P2 gate)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build bundle
        run: pnpm run build

      - name: Generate fixtures (incl. ZUGFeRD hybrid)
        run: node scripts/gen-fixtures.mjs

      # Resolve the Mustang-CLI jar URL via the GitHub Releases API (tags rot less than asset paths).
      - name: Download Mustangproject CLI 2.24.0 (embeds veraPDF)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MUSTANG_TAG: core-2.24.0
        run: |
          set -euo pipefail
          mkdir -p .validators
          asset_re='Mustang-CLI.*\.jar$'
          # Try the pinned tag first, then fall back to scanning recent releases for the CLI jar.
          JAR_URL="$(gh api "repos/ZUGFeRD/mustangproject/releases/tags/${MUSTANG_TAG}" \
            --jq ".assets[] | select(.name | test(\"${asset_re}\")) | .browser_download_url" 2>/dev/null | head -n1 || true)"
          if [ -z "${JAR_URL:-}" ]; then
            JAR_URL="$(gh api "repos/ZUGFeRD/mustangproject/releases?per_page=30" \
              --jq ".[].assets[] | select(.name | test(\"${asset_re}\")) | .browser_download_url" | head -n1)"
          fi
          test -n "${JAR_URL:-}" || { echo "Could not resolve a Mustang-CLI jar URL"; exit 1; }
          echo "Mustang CLI: $JAR_URL"
          curl -fsSL "$JAR_URL" -o .validators/mustang-cli.jar
          echo "MUSTANG_JAR=$PWD/.validators/mustang-cli.jar" >> "$GITHUB_ENV"

      - name: Validate hybrid (Mustang --action validate → embedded veraPDF + Factur-X)
        env:
          FIXTURES_DIR: dist/fixtures
        run: node scripts/mustang-check.mjs
